<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Application</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#services">Services</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="left-panel" aria-label="Left Panel">
            <div class="widget" aria-label="Widget 1">Widget 1 Content</div>
            <div class="widget" aria-label="Widget 2">Widget 2 Content</div>
        </div>
        <div class="main-content" aria-label="Main Content">
            <h1>Main Content Title</h1>
            <div class="content-card" aria-label="Content Card 1">This is a content card.</div>
            <div class="content-card" aria-label="Content Card 2">This is another content card.</div>
        </div>
        <div class="right-panel" aria-label="Right Panel">
            <div class="widget" aria-label="Widget 3">Widget 3 Content</div>
            <div class="widget" aria-label="Widget 4">Widget 4 Content</div>
        </div>
    </main>
    <footer>
        <div class="bottom-menu" aria-label="Bottom Menu">
            <button aria-label="Toggle Dark Mode" onclick="toggleDarkMode()">Toggle Dark Mode</button>
            <button aria-label="Expand/Collapse Panels" onclick="togglePanels()">Toggle Panels</button>
            <button aria-label="Pin Functionality" onclick="pinPanel()">Pin</button>
        </div>
    </footer>
</body>
</html>

<script>
    // JavaScript for user preferences and functionality
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        saveUserPreference('dark-mode', document.body.classList.contains('dark-mode'));
    }

    function togglePanels() {
        const panels = document.querySelectorAll('.left-panel, .right-panel');
        panels.forEach(panel => panel.classList.toggle('collapsed'));
    }

    function pinPanel() {
        // Logic for pinning panels
    }

    function saveUserPreference(key, value) {
        localStorage.setItem(key, value);
    }

    function loadUserPreferences() {
        const isDarkMode = localStorage.getItem('dark-mode') === 'true';
        if (isDarkMode) {
            document.body.classList.add('dark-mode');
        }
    }

    document.addEventListener('DOMContentLoaded', loadUserPreferences);
</script>
